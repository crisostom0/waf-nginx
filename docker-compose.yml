services:
  nginx_waf:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: nginx_waf
    restart: always
    tty: true
    environment:
      - TZ=America/Fortaleza
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/conf.d:/etc/nginx/conf.d
      - ./config/nginx.conf:/etc/nginx/nginx.conf
      - ./modsec:/etc/nginx/modsec
      - ./ssl:/etc/ssl
    networks:
      - proxy

networks:
  proxy: 
      external: true